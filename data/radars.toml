# SuperDARN radar site geometry — vendored from the SuperDARN Hardware
# (hdw) repository: https://github.com/SuperDARN/hdw  (hdw.dat.<abbr>).
#
# Fields per radar:
#   id          numeric station id (hdw.dat column 1)
#   name        full site name
#   lat/lon     geographic latitude / longitude of the array (deg)
#   alt_m       altitude (m)
#   boresight   geographic azimuth of the centre of the field of view (deg)
#   beam_sep    angular beam separation (deg)
#   n_beams     operational scan beam count (normalscan = 16; hardware max
#               in hdw is larger — see max_beams)
#   max_beams   hardware-maximum beams (hdw.dat last column)
#   hemisphere  "N" | "S"
#
# This is the candidate set audible from central Missouri (the Fort Hays
# pair is the close anchor; the rest are 1–2-hop skywave).  `radars.py`
# filters by great-circle distance from the receiver.  Values are the
# valid-from-latest hdw.dat rows; reconcile against hdw on update.


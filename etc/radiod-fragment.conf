# superdarn-sounder radiod channel fragment.
#
# Sigmond renders this template into
#   /etc/radio/radiod@<id>.conf.d/40-superdarn-sounder.conf
# during `smd apply` (CONTRACT §15).  Editing this file in place is pointless —
# sigmond overwrites it on the next apply; change the source in this repo.
#
# preset = "iq" is required: passive pulse-sequence detection needs the raw I/Q
# samples with phase preserved.  samprate must be wide enough to resolve the
# ~300 µs pulses and the multi-pulse spacing — 100 kHz (±50 kHz) is comfortable.
# The channel centre defaults to 12 MHz (where most SuperDARN radars park);
# override via coordination.toml.

[superdarn-12mhz]
freq      = "${RADIOD_SUPERDARN_HZ}"   # default 12000000 Hz; operator may override
preset    = "iq"
samprate  = 100000
encoding  = "f32le"
mode      = "iq"
